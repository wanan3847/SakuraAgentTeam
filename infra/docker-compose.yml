version: '3.8'

services:
  backend:
    build:
      context: ..
      dockerfile: infra/docker/sandbox.Dockerfile
    container_name: sakura-backend
    working_dir: /workspace
    command: >
      bash -c "pip install -q -r requirements.txt &&
               uvicorn app.api.main:app --host 0.0.0.0 --port 8000"
    volumes:
      - ../backend:/workspace
      - ../data:/workspace/data
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/sakura.db
      - EXPERIENCE_DB_PATH=./data/experience_db
      - PROJECTS_ROOT=./data/projects
      - LOG_LEVEL=INFO
    env_file:
      - ../backend/.env
    restart: unless-stopped

  frontend:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
    container_name: sakura-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped
