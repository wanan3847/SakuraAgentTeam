version: "3.8"

# SakuraAgentTeam 生产部署
# 启动：  docker compose -f infra/docker-compose.yml up -d --build
# 停止：  docker compose -f infra/docker-compose.yml down
# 日志：  docker compose -f infra/docker-compose.yml logs -f
# 重启：  docker compose -f infra/docker-compose.yml restart
#
# 数据持久化：
#   - backend_data  -> /app/data（git 仓库、经验库、sessions）
#   - frontend 直接 build 到 nginx，不需要 volume
#
# 端口：
#   - 8080 (host) -> 80 (frontend nginx)
#   - 8000 (host) -> 8000 (backend uvicorn)

services:
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    image: sakura-backend:latest
    container_name: sakura-backend
    restart: unless-stopped
    working_dir: /app
    env_file:
      - ../backend/.env
    environment:
      - PROJECTS_ROOT=/app/data/projects
      - EXPERIENCE_DB_PATH=/app/data/experience_db
      - DATA_DIR=/app/data
      - LOG_LEVEL=INFO
      - PYTHONUNBUFFERED=1
    volumes:
      - backend_data:/app/data
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    image: sakura-frontend:latest
    container_name: sakura-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3

volumes:
  backend_data:
    name: sakura_backend_data
