# /etc/nginx/conf.d/team.041126.xyz.conf
# 樱花小队生产部署 — 前置反向代理
# 用法：
#   sudo cp infra/nginx-sakura.conf /etc/nginx/conf.d/team.041126.xyz.conf
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen 5173;
    listen [::]:80;
    listen [::]:5173;
    server_name team.041126.xyz;

    root /opt/SakuraAgentTeam/frontend/dist;
    index index.html;
    client_max_body_size 20M;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    # SSE / 长连接
    proxy_buffering off;
    proxy_read_timeout  300s;
    proxy_send_timeout  300s;

    access_log /var/log/nginx/sakura.access.log;
    error_log  /var/log/nginx/sakura.error.log warn;

    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
    }

    location /health {
        proxy_pass         http://127.0.0.1:8000/health;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
