# /etc/nginx/sites-available/sakura
# 樱花小队生产部署 — 前置反向代理 + HTTPS
# 用法：
#   sudo cp infra/nginx-sakura.conf /etc/nginx/sites-available/sakura
#   sudo ln -s /etc/nginx/sites-available/sakura /etc/nginx/sites-enabled/sakura
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d sakura.yourdomain.com

# 强制 HTTPS
server {
    listen 80;
    server_name sakura.yourdomain.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name sakura.yourdomain.com;

    client_max_body_size 20M;

    # SSL 证书（certbot 自动管理）
    ssl_certificate     /etc/letsencrypt/live/sakura.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sakura.yourdomain.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # HSTS
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    # SSE / 长连接
    proxy_buffering off;
    proxy_read_timeout  300s;
    proxy_send_timeout  300s;

    access_log /var/log/nginx/sakura.access.log;
    error_log  /var/log/nginx/sakura.error.log warn;

    # 前端（SPA fallback 到 index.html）
    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # 可选：后端 API 直接暴露（绕过前端 nginx）
    # location /api/ {
    #     proxy_pass         http://127.0.0.1:8000;
    #     proxy_set_header   Host              $host;
    #     proxy_set_header   X-Real-IP         $remote_addr;
    #     proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    #     proxy_set_header   X-Forwarded-Proto $scheme;
    # }
}
